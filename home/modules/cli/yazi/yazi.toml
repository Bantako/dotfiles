[opener]
# xdg-open でシステムのデフォルトアプリを使う
open = [
  { run = 'xdg-open %s', block = false, desc = 'Open with default app (xdg-open)'},
]
# PDFビューアー
read = [
  { run = 'zathura %s', block = false, desc = 'PDF Viewer (zathura)'},
]
# Exif情報表示
exif = [
  { run = 'exif %s', block = true, desc = 'Show Exif'},
]
# 画像ビューアー
view = [
  { run = 'vimiv %s', block = false, desc = 'Image Viewer (vimiv)'}
]
# 動画・音声プレーヤー
play = [
  { run = 'mpv %s', block = false, desc = 'Player (mpv)'},
]
# テキスト表示（シンタックスハイライト）
show_text = [
  { run = 'bat --paging=always --pager="ov" %s', block = true, desc = 'View Text (bat)'}
]
# Markdownレンダリング
show_md = [
  { run = 'glow -p %s', block = true, desc = 'View Markdown (glow)' }
]
# エディタで編集
edit = [
  { run = '$EDITOR %s', block = true, desc = 'Edit ($EDITOR)' }
]
# アーカイブ展開
unzip = [
  { run = 'unzip -O cp932 %s', block = false, desc = 'Unzip (Shift-JIS対応)'}
]
extract = [
  { run = 'ouch decompress -y %s', block = true, desc = 'Extract archive (ouch)'},
]

[open]
prepend_rules = [
  { url = "*.md",  use = ["show_md", "edit"] },
  { url = "*.mdx", use = ["show_md", "edit"] },
  { mime = "text/markdown", use = ["show_md"] },
  { mime = "image/*", use = ["view", "exif"] },
  { mime = "video/*", use = ["play"] },
  { mime = "audio/*", use = ["play"] },
  { mime = "application/pdf", use = ["read"] },
  { mime = "application/epub+zip", use = ["read"] },
  # アーカイブ（MIME で判定）
  { mime = "application/zip", use = ["unzip", "extract"] },
  { mime = "application/x-tar", use = ["extract"] },
  { mime = "application/gzip", use = ["extract"] },
  { mime = "application/x-xz", use = ["extract"] },
  { mime = "application/x-bzip2", use = ["extract"] },
  { mime = "application/zstd", use = ["extract"] },
  { mime = "application/x-7z-compressed", use = ["extract"] },
  { mime = "application/x-rar", use = ["extract"] },
  # HTML・XML はブラウザ
  { mime = "text/html", use = ["open"] },
  { mime = "application/xhtml+xml", use = ["open"] },
  # オフィス文書は xdg-open（LibreOffice 等）
  { mime = "application/vnd.oasis.opendocument.*", use = ["open"] },
  { mime = "application/vnd.openxmlformats-officedocument.*", use = ["open"] },
  { mime = "application/msword", use = ["open"] },
  { mime = "application/vnd.ms-excel", use = ["open"] },
  { mime = "application/vnd.ms-powerpoint", use = ["open"] },
]

append_rules = [
  # 上記以外はすべてテキストとして表示
  { url = "*", use = ["show_text"] }
]

[mgr]
show_hidden = true
show_symlink = true

[[plugin.prepend_preloaders]]
name = "/mnt/synology/**"
run = "noop"

[[plugin.prepend_fetchers]]
id   = "mime"
name = "*"
run  = "mime-ext"
prio = "high"

[[plugin.prepend_fetchers]]
id   = "git"
name = "*"
run  = "git"

[[plugin.prepend_previewers]]
mime = "video/*"
run  = "mediainfo"

[[plugin.prepend_previewers]]
mime = "audio/*"
run  = "mediainfo"
