[opener]
# xdg-open でシステムのデフォルトアプリを使う
open = [
  { run = 'xdg-open "$@"', block = false, desc = 'Open with default app (xdg-open)'},
]
# PDFビューアー
read = [
  { run = 'zathura "$@"', block = false, desc = 'PDF Viewer (zathura)'},
]
# Exif情報表示
exif = [
  { run = 'exif "$@"', block = true, desc = 'Show Exif'},
]
# 画像ビューアー
view = [
  { run = 'vimiv "$@"', block = false, desc = 'Image Viewer (vimiv)'}
]
# 動画・音声プレーヤー
play = [
  { run = 'mpv "$@"', block = false, desc = 'Player (mpv)'},
]
# テキスト表示（シンタックスハイライト）
show_text = [
  { run = 'bat --paging=always --pager="ov" "$@"', block = true, desc = 'View Text (bat)'}
]
# アーカイブ展開
unzip = [
  { run = 'unzip -O cp932 "$@"', block = false, desc = 'Unzip (Shift-JIS対応)'}
]
extract = [
  { run = 'for f in "$@"; do ouch decompress -y -d "${f%%.*}" "$f"; done', block = true, desc = 'Extract archive (ouch)'},
]

[open]
prepend_rules = [
  # mime-ext fetcher が提供する MIME タイプで判定（name グロブより確実）
  { mime = "image/*", use = ["view", "exif"] },
  { mime = "video/*", use = ["play"] },
  { mime = "audio/*", use = ["play"] },
  { mime = "application/pdf", use = ["read"] },
  { mime = "application/epub+zip", use = ["read"] },
  # アーカイブ（MIME で判定）
  { mime = "application/zip", use = ["unzip", "extract"] },
  { mime = "application/x-tar", use = ["extract"] },
  { mime = "application/gzip", use = ["extract"] },
  { mime = "application/x-xz", use = ["extract"] },
  { mime = "application/x-bzip2", use = ["extract"] },
  { mime = "application/zstd", use = ["extract"] },
  { mime = "application/x-7z-compressed", use = ["extract"] },
  { mime = "application/x-rar", use = ["extract"] },
  # HTML・XML はブラウザ
  { mime = "text/html", use = ["open"] },
  { mime = "application/xhtml+xml", use = ["open"] },
  # オフィス文書は xdg-open（LibreOffice 等）
  { mime = "application/vnd.oasis.opendocument.*", use = ["open"] },
  { mime = "application/vnd.openxmlformats-officedocument.*", use = ["open"] },
  { mime = "application/msword", use = ["open"] },
  { mime = "application/vnd.ms-excel", use = ["open"] },
  { mime = "application/vnd.ms-powerpoint", use = ["open"] },
]

append_rules = [
  # 上記以外はすべてテキストとして表示
  { name = "*", use = ["show_text"] }
]

[mgr]
show_hidden = true
show_symlink = true

[[plugin.prepend_preloaders]]
name = "/mnt/synology/**"
run = "noop"

[[plugin.prepend_fetchers]]
id   = "mime"
name = "*"
run  = "mime-ext"
prio = "high"

[[plugin.prepend_fetchers]]
id   = "git"
name = "*"
run  = "git"
